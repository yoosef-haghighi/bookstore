{% extends '_base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Login{% endblock %}

{% block content %}
    <form action="" method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-success" type="submit">Log In</button>
    </form>

    <a href="{% url "password_reset" %}">Forgot Password?</a> | <a href="{% url "signup" %}">Create New Account</a>


{% endblock %}
